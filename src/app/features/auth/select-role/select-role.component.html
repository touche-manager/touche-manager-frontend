<div class="flex-1 flex items-center justify-center py-6 px-4">
  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-touche-navy">Elige tu rol</h1>
      <p class="mt-2 text-sm text-slate-500">Tu cuenta tiene múltiples roles. Selecciona cómo deseas continuar.</p>
    </div>

    <!-- Role cards -->
    <div class="space-y-3">
      @for (rol of roles(); track rol) {
        <button
          type="button"
          (click)="selectRole(rol)"
          [disabled]="loading()"
          class="w-full text-left rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition
                 hover:border-touche-celeste hover:shadow-md hover:bg-touche-celeste/10
                 focus:outline-none focus:ring-2 focus:ring-touche-celeste focus:ring-offset-2
                 disabled:opacity-60 disabled:cursor-not-allowed"
        >
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm font-semibold text-touche-navy">{{ roleLabels[rol] }}</p>
              <p class="mt-0.5 text-xs text-slate-500">{{ roleDescriptions[rol] }}</p>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </button>
      }
    </div>

    <!-- Loading indicator -->
    @if (loading()) {
      <div class="mt-6 flex items-center justify-center gap-2 text-sm text-slate-500">
        <svg class="animate-spin h-4 w-4 text-touche-celeste" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        Cargando...
      </div>
    }

    <!-- Backend error -->
    @if (errorMessage()) {
      <div class="mt-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        {{ errorMessage() }}
      </div>
    }

  </div>
</div>
