<main class="min-h-[100dvh] bg-touche-slate text-touche-navy flex flex-col">
  <!-- Header / Navigation Bar -->
  <header class="border-b border-touche-celeste/20 bg-touche-navy shadow-md flex-shrink-0">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3.5 md:px-6">

      <!-- Brand & Navigation Group -->
      <div class="flex items-center space-x-4 min-w-0">
        <img src="/logo.jpg" alt="Touché Manager" class="h-8 w-8 rounded-full border border-touche-celeste/40 object-cover flex-shrink-0" />
        <span class="text-lg font-bold text-white tracking-wide truncate flex-shrink-0">
          Touché Manager
        </span>

        <!-- Navigation Links (only shown when authenticated) -->
        <nav *ngIf="isAuthenticated()" class="text-sm font-semibold text-touche-celeste/80 flex items-center space-x-1 overflow-x-auto scrollbar-none py-1">
          <a
            *ngIf="currentRol() === 'ATLETA' || currentRol() === 'ADMIN'"
            routerLink="/athlete"
            routerLinkActive="text-white bg-white/10"
            [routerLinkActiveOptions]="{exact: false}"
            class="px-3 py-1.5 rounded-lg hover:text-white hover:bg-white/5 transition-colors duration-150 whitespace-nowrap"
          >
            Mi Perfil
          </a>
          <a
            *ngIf="currentRol() === 'ORGANIZADOR' || currentRol() === 'ADMIN'"
            routerLink="/tournament"
            routerLinkActive="text-white bg-white/10"
            [routerLinkActiveOptions]="{exact: false}"
            class="px-3 py-1.5 rounded-lg hover:text-white hover:bg-white/5 transition-colors duration-150 whitespace-nowrap"
          >
            Torneos
          </a>
          <a
            *ngIf="currentRol() === 'ARBITRO' || currentRol() === 'ADMIN'"
            routerLink="/bout"
            routerLinkActive="text-white bg-white/10"
            [routerLinkActiveOptions]="{exact: false}"
            class="px-3 py-1.5 rounded-lg hover:text-white hover:bg-white/5 transition-colors duration-150 whitespace-nowrap"
          >
            Asaltos
          </a>
        </nav>
      </div>

      <!-- User Role and Logout Controls (only shown when authenticated) -->
      <div *ngIf="isAuthenticated()" class="flex items-center space-x-2 md:space-x-3 flex-shrink-0 pl-2">
        <!-- Active Role Badge -->
        <span
          class="hidden sm:inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-touche-celeste/10 text-touche-celeste border border-touche-celeste/20 uppercase tracking-wider"
        >
          {{ currentRol() }}
        </span>

        <!-- Change Role Button -->
        <button
          *ngIf="hasMultipleRoles()"
          (click)="changeRole()"
          title="Cambiar rol"
          class="inline-flex items-center justify-center px-3 py-1.5 border border-touche-celeste/40 text-xs font-bold rounded-lg text-touche-celeste bg-white/5 hover:bg-white/10 shadow-sm transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-touche-celeste gap-1.5"
        >
          <!-- Double arrow swap SVG icon -->
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
          </svg>
          <span class="hidden md:inline">Cambiar rol</span>
        </button>

        <!-- Logout Button -->
        <button
          (click)="logout()"
          title="Cerrar sesión"
          class="inline-flex items-center justify-center px-3 py-1.5 border border-transparent text-xs font-bold rounded-lg text-white bg-touche-alert hover:bg-[#C13F2E] shadow-sm transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-touche-alert gap-1.5"
        >
          <!-- Door/Logout SVG icon -->
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span class="hidden md:inline">Cerrar sesión</span>
        </button>
      </div>

    </div>
  </header>

  <!-- Main Content Layout Container -->
  <div class="flex-1 w-full mx-auto max-w-5xl px-4 py-6 md:px-6 md:py-8 flex flex-col min-h-0">
    <router-outlet />
  </div>
</main>
